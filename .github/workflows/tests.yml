name: Code Checks

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}
    - name: Install project
      run: uv sync --group dev
    - name: Run tests
      run: uv run pytest

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        python-version: "3.12"
    - name: Install project
      run: uv sync --group dev
    - name: Rebuild package from notebook
      run: uv run python nbs/build.py
    - name: Check dicekit/__init__.py is up to date
      run: |
        if ! git diff --exit-code -- dicekit/__init__.py; then
          echo "::error::dicekit/__init__.py is out of sync with nbs/__init__.py. Run 'make build' and commit the result."
          exit 1
        fi
